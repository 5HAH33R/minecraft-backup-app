<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minecraft Backup Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css?v=2">
  <style>
    @font-face {
      font-family: 'Minecraft';
      src: url('Minecraft.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
  </style>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            'press-start': ['Minecraft', 'system-ui'],
            'pixel': ['Minecraft', '"Courier New"', 'monospace'],
          },
          colors: {
            mc: {
              sky: '#5CACED',
              cream: '#FAFBD3',
              wood: '#C69F78',
              darkwood: '#995A24',
              grass: '#5D6B2E',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#1a1410] text-[#FAFBD3] min-h-screen font-pixel">
  <div id="app"></div>
  <div id="toasts" class="fixed top-4 right-4 z-50 space-y-2"></div>
  <div id="confirm-overlay" class="fixed inset-0 bg-black/80 z-40 hidden items-center justify-center">
    <div id="confirm-dialog" class="pixel-card max-w-md w-full mx-4"></div>
  </div>
  <script src="app.js?v=6"></script>
</body>
</html>
